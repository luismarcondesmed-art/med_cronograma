            defaultSchedule: [
                { week: 1, modules: [ { code: "EX 01", title: "Carregamento Falhou", lessons: ["Verifique sua conexão", "Tente recarregar a página"], bonusLessons: [] } ] }
            ]
        };

        const { weeklyLayout, disciplineMapping, disciplines, defaultSchedule, apostilasData } = scheduleData;
        const SCHEDULE_VERSION = "1.2_bonus_lessons_sync";
        
        // --- COMPONENTES ---

        const Icon = ({ name, ...props }) => {
            if (!window.lucide || !window.lucide[name]) return <span className="w-6 h-6 inline-block" />;
            return React.createElement(window.lucide[name], props);
        };
        
        const WelcomeModal = ({ onClose }) => (
            <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl max-w-2xl w-full p-6 md:p-8 transform transition-all scale-95 animate-scale-in">
                    <div className="flex justify-between items-center mb-4">
                         <h2 className="text-2xl md:text-3xl font-bold text-sky-600 dark:text-sky-400">Bem-vindo ao Checklist Medcurso!</h2>
                         <button onClick={onClose} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"><Icon name="X" className="w-6 h-6 text-slate-500 dark:text-slate-400" /></button>
                    </div>
                    <p className="mb-4 text-slate-600 dark:text-slate-300">Uma plataforma personalizável para organizar seus estudos.</p>
                    <ul className="space-y-3 mb-6 text-slate-700 dark:text-slate-200">
                        <li className="flex items-start gap-3"><Icon name="Edit" className="w-5 h-5 mt-1 text-sky-500 flex-shrink-0" /><span>Adicione e remova aulas para adaptar o cronograma à sua realidade.</span></li>
                        <li className="flex items-start gap-3"><Icon name="Cloud" className="w-5 h-5 mt-1 text-sky-500 flex-shrink-0" /><span>Seu cronograma personalizado e seu progresso são salvos na nuvem.</span></li>
                        <li className="flex items-start gap-3"><Icon name="Smartphone" className="w-5 h-5 mt-1 text-sky-500 flex-shrink-0" /><span>Instale como um aplicativo no seu celular para acesso rápido.</span></li>
                    </ul>
                    <button onClick={onClose} className="w-full bg-sky-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-sky-700 transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-sky-300 dark:focus:ring-sky-800">Começar a Organização</button>
                </div>
                 <style>{`
                    @keyframes scale-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
                    .animate-scale-in { animation: scale-in 0.3s ease-out forwards; }
                `}</style>
            </div>
        );

        const ChecklistItem = ({ lessonId, progress, onToggle }) => {
            const checklistOptions = [
                { id: 'aula', label: 'Aula', icon: 'Youtube' }, { id: 'anki', label: 'Anki', icon: 'Copy' },
                { id: 'exercicios', label: 'Exercícios', icon: 'ClipboardCheck' }, { id: 'revisao', label: 'Revisão', icon: 'Repeat' }
            ];
            return (
                <div className="flex flex-shrink-0 flex-wrap items-center justify-start sm:justify-end gap-1 sm:gap-4 mt-2 sm:mt-0">
                    {checklistOptions.map(opt => {
                        const isChecked = progress && progress[opt.id];
                        return (
                             <label key={opt.id} title={opt.label} className="flex items-center gap-2 cursor-pointer p-1.5 rounded-lg transition-colors hover:bg-slate-200 dark:hover:bg-slate-700/60">
                                <input type="checkbox" checked={isChecked || false} onChange={() => onToggle(lessonId, opt.id)} className="sr-only peer" />
                                <div className={`w-5 h-5 rounded-md flex items-center justify-center border-2 transition-all duration-200 ${isChecked ? 'bg-sky-500 border-sky-500' : 'bg-transparent border-slate-400 dark:border-slate-600 peer-hover:border-sky-400'}`}>
                                    {isChecked && <Icon name="Check" className="w-4 h-4 text-white" />}
                                </div>
                                <Icon name={opt.icon} className={`w-5 h-5 transition-colors ${isChecked ? 'text-sky-500 dark:text-sky-400' : 'text-slate-500 dark:text-slate-400'}`} />
                                <span className={`text-sm font-medium hidden lg:inline transition-colors ${isChecked ? 'text-slate-800 dark:text-slate-200' : 'text-slate-500 dark:text-slate-400'}`}>{opt.label}</span>
                            </label>
                        );
                    })}
                </div>
            );
        };
        
        const AddLessonForm = ({ onAddLesson, onCancel }) => {
            const [lessonName, setLessonName] = useState('');
            const inputRef = useRef(null);

            useEffect(() => {
                inputRef.current?.focus();
            }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (lessonName.trim()) {
                    onAddLesson(lessonName.trim());
                    setLessonName('');
                }
            };

            return (
                <form onSubmit={handleSubmit} className="flex items-center gap-2 p-2 rounded-lg bg-slate-100 dark:bg-slate-800/50">
                    <input
                        ref={inputRef}
                        type="text"
                        value={lessonName}
                        onChange={(e) => setLessonName(e.target.value)}
                        placeholder="Nome da nova aula"
                        className="flex-grow bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md px-3 py-1.5 text-sm focus:ring-2 focus:ring-sky-500 focus:outline-none"
                    />
                    <button type="submit" className="p-2 rounded-md bg-sky-500 text-white hover:bg-sky-600 transition-colors"><Icon name="Check" className="w-4 h-4"/></button>
                    <button type="button" onClick={onCancel} className="p-2 rounded-md bg-slate-200 dark:bg-slate-600 hover:bg-slate-300 dark:hover:bg-slate-500 transition-colors"><Icon name="X" className="w-4 h-4"/></button>
                </form>
            );
        };

        const ModuleCard = ({ module, weekIndex, moduleIndex, progress, onToggle, onAddLesson, onRemoveLesson }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [isBonusAdding, setIsBonusAdding] = useState(false);
            const [isBonusVisible, setIsBonusVisible] = useState(true);

            const calculateProgress = (lessons) => {
                if (!lessons || lessons.length === 0) return { completed: 0, total: 0 };
                const totalItems = lessons.length * 4;
                const completedItems = lessons.reduce((acc, lesson) => {
                    const lessonProgress = progress[lesson.id] || {};
                    return acc + Object.values(lessonProgress).filter(Boolean).length;
                }, 0);
                return { completed: completedItems, total: totalItems };
            }

            const mainProgress = calculateProgress(module.lessons);
            const bonusProgress = calculateProgress(module.bonusLessons);
            const totalCompleted = mainProgress.completed + bonusProgress.completed;
            const totalItems = mainProgress.total + bonusProgress.total;
            const progressPercentage = totalItems > 0 ? (totalCompleted / totalItems) * 100 : 0;

            const handleAddLesson = (lessonName, isBonus = false) => {
                onAddLesson(weekIndex, moduleIndex, lessonName, isBonus);
                if (isBonus) setIsBonusAdding(false);
                else setIsAdding(false);
            }

            const LessonList = ({ lessons, isBonus = false }) => (
                <ul className="space-y-2">
                    {lessons.map((lesson, lessonIndex) => (
                       <li key={lesson.id} className="group flex flex-col sm:flex-row justify-between sm:items-center p-2 rounded-lg bg-slate-50 dark:bg-slate-900/50 hover:bg-slate-100 dark:hover:bg-slate-900/80 transition-colors">
                           <p className="text-sm font-medium text-slate-700 dark:text-slate-300 flex-grow mr-2">{lesson.name}</p>
                           <div className="flex items-center gap-2">
                               <ChecklistItem lessonId={lesson.id} progress={progress[lesson.id]} onToggle={onToggle} />
                               <button onClick={() => onRemoveLesson(weekIndex, moduleIndex, lessonIndex, isBonus)} className="p-1 rounded-full text-slate-400 hover:bg-red-100 hover:text-red-500 dark:hover:bg-red-900/50 opacity-0 group-hover:opacity-100 transition-opacity">
                                   <Icon name="Trash2" className="w-4 h-4"/>
                               </button>
                           </div>
                       </li>
                    ))}
                </ul>
            );

            return (
                <div className="bg-white dark:bg-slate-800/80 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                    <div className="flex justify-between items-center mb-3">
                        <div>
                            <span className="text-xs font-bold uppercase text-sky-500 dark:text-sky-400 tracking-wider">{module.discipline} - {module.code}</span>
                            <h4 className="font-bold text-slate-800 dark:text-slate-100">{module.title}</h4>
                        </div>
                        <span className="text-sm font-semibold text-slate-500 dark:text-slate-400">{Math.round(progressPercentage)}%</span>
                    </div>
                    <div className="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2 mb-4">
                        <div className="bg-sky-500 h-2 rounded-full transition-all duration-300" style={{ width: `${progressPercentage}%` }}></div>
                    </div>
                    
                    <LessonList lessons={module.lessons} />
                    <div className="mt-3">
                        {isAdding ? (
                            <AddLessonForm onAddLesson={(name) => handleAddLesson(name, false)} onCancel={() => setIsAdding(false)} />
                        ) : (
                            <button onClick={() => setIsAdding(true)} className="w-full text-sm font-semibold text-sky-600 dark:text-sky-400 hover:bg-sky-50 dark:hover:bg-sky-900/50 p-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                                <Icon name="PlusCircle" className="w-4 h-4"/> Adicionar Aula
                            </button>
                        )}
                    </div>

                    {module.bonusLessons && module.bonusLessons.length > 0 && (
                        <div className="mt-4 pt-4 border-t border-slate-200 dark:border-slate-700">
                            <button onClick={() => setIsBonusVisible(!isBonusVisible)} className="w-full flex justify-between items-center p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700/60">
                                <h5 className="font-bold text-slate-600 dark:text-slate-300">Aulas Bônus</h5>
                                <Icon name={isBonusVisible ? "ChevronUp" : "ChevronDown"} className="w-5 h-5 text-slate-500"/>
                            </button>
                            {isBonusVisible && (
                                <div className="mt-2 pl-2 border-l-2 border-sky-200 dark:border-sky-800">
                                    <LessonList lessons={module.bonusLessons} isBonus={true} />
                                     <div className="mt-3">
                                        {isBonusAdding ? (
                                            <AddLessonForm onAddLesson={(name) => handleAddLesson(name, true)} onCancel={() => setIsBonusAdding(false)} />
                                        ) : (
                                            <button onClick={() => setIsBonusAdding(true)} className="w-full text-sm font-semibold text-sky-600 dark:text-sky-400 hover:bg-sky-50 dark:hover:bg-sky-900/50 p-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                                                <Icon name="PlusCircle" className="w-4 h-4"/> Adicionar Aula Bônus
                                            </button>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            )
        }
        
        const Header = ({ onSearch, onFilter, onThemeToggle, currentTheme }) => (
            <header className="sticky top-0 z-40 bg-white/80 dark:bg-slate-950/80 backdrop-blur-lg border-b border-slate-200 dark:border-slate-800 py-3 px-4 sm:px-6">
                <div className="flex items-center justify-between gap-4">
                    <div className="flex items-center gap-3 flex-shrink-0">
                        <div className="bg-sky-500 p-2 rounded-lg"><Icon name="ClipboardCheck" className="w-6 h-6 text-white" /></div>
                        <h1 className="text-lg sm:text-xl font-bold text-slate-800 dark:text-slate-100 hidden sm:block">Checklist Medcurso</h1>
                    </div>
                    <div className="flex-1 flex justify-center min-w-0 px-4">
                        <div className="relative w-full max-w-lg">
                            <Icon name="Search" className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" />
                            <input type="text" placeholder="Buscar aula ou disciplina..." onChange={(e) => onSearch(e.target.value)} className="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors" />
                        </div>
                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0">
                        <select onChange={(e) => onFilter(e.target.value)} className="py-2 px-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors appearance-none hidden md:block">
                            <option value="">Todas</option>
                            {disciplines.map(d => <option key={d} value={d} className="dark:bg-slate-800">{d}</option>)}
                        </select>
                        <button onClick={onThemeToggle} title="Mudar tema" className="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                            <Icon name={currentTheme === 'dark' ? 'Sun' : 'Moon'} className="w-6 h-6 text-slate-600 dark:text-slate-300" />
                        </button>
                    </div>
                </div>
            </header>
        );

        const Sidebar = ({ weeks, activeWeek, onSelectWeek }) => (
             <aside className="w-60 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex-col hidden md:flex">

                 <nav className="flex-1 overflow-y-auto p-2 space-y-1">

                         <button 
                            key={week.week}

                             Semana {String(week.week).padStart(2, '0')}
                         </button>
                     ))}
                 </nav>
             </aside>
        );

        const App = () => {
            const [schedule, setSchedule] = useState(null);
            const [progress, setProgress] = useState({});
            const [searchTerm, setSearchTerm] = useState('');
            const [filter, setFilter] = useState('');
            const [theme, setTheme] = useState('light');
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showWelcome, setShowWelcome] = useState(false);
            const [activeWeek, setActiveWeek] = useState(1);
            
            const firebaseConfig = {
                apiKey: "AIzaSyCvqp5HYUMnogWmwT0O1LFLOMsfqj9P83s",
                authDomain: "med-heklp.firebaseapp.com",
                projectId: "med-heklp",
                storageBucket: "med-heklp.appspot.com",
                messagingSenderId: "675054342845",
                appId: "1:675054342845:web:91e53e21060a087123ddd4",
                measurementId: "G-BLWYTWFFTZ"
            };

            const processInitialSchedule = useCallback(() => {
                return (weeklyLayout || defaultSchedule).map(weekInfo => ({
                    ...weekInfo,
                    modules: weekInfo.modules.map(module => ({
                        ...module,
                        discipline: disciplineMapping[module.code.split(' ')[0]] || 'Desconhecida',
                        lessons: module.lessons.map(lessonName => ({
                            name: lessonName,
                            id: `W${weekInfo.week}-${module.code.replace(/\s/g, '')}-${lessonName.replace(/[^a-zA-Z0-9]/g, '')}`
                        })),
                        bonusLessons: (apostilasData[module.code]?.bonusLessons || []).map(lessonName => ({
                            name: lessonName,
                            id: `B-${module.code.replace(/\s/g, '')}-${lessonName.replace(/[^a-zA-Z0-9]/g, '')}`
                        }))
                    }))
                }));
            }, []);

            useEffect(() => {
                try {
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const firestore = getFirestore(app);
                    setDb(firestore);
                    onAuthStateChanged(auth, currentUser => {
                        if (currentUser) setUser(currentUser);
                        else signInAnonymously(auth).catch(e => console.error("Anonymous sign-in error", e));
                    });
                } catch (e) { console.error("Firebase init error:", e); setLoading(false); }
                
                if (!localStorage.getItem('hasVisitedMedChecklistV6')) {
                    setShowWelcome(true);
                    localStorage.setItem('hasVisitedMedChecklistV6', 'true');
                }
            }, []);

            useEffect(() => {
                if (!user || !db) return;

                const progressDocRef = doc(db, 'progress', user.uid);
                const scheduleDocRef = doc(db, 'schedules', user.uid);

                const unsubProgress = onSnapshot(progressDocRef, (docSnap) => {
                    if (docSnap.exists()) setProgress(docSnap.data());
                }, (error) => console.error("Progress snapshot error: ", error));

                const unsubSchedule = onSnapshot(scheduleDocRef, (docSnap) => {
                    if (docSnap.exists() && docSnap.data().schedule && docSnap.data().version === SCHEDULE_VERSION) {
                        setSchedule(docSnap.data().schedule);
                    } else {
                        console.log("Outdated or no custom schedule found. Initializing/updating with default.");
                        const processedSchedule = processInitialSchedule();
                        setDoc(scheduleDocRef, { schedule: processedSchedule, version: SCHEDULE_VERSION });
                        setSchedule(processedSchedule);
                    }
                    setLoading(false);
                }, (error) => { 
                    console.error("Schedule snapshot error: ", error); 
                    setSchedule(processInitialSchedule()); // Fallback on error
                    setLoading(false); 
                });

                return () => {
                    unsubProgress();
                    unsubSchedule();
                };
            }, [user, db, processInitialSchedule]);

            useEffect(() => {
                const savedTheme = localStorage.getItem('theme') || 'light';
                setTheme(savedTheme);
                document.documentElement.classList.toggle('dark', savedTheme === 'dark');
            }, []);

            const handleThemeToggle = () => {
                const newTheme = theme === 'light' ? 'dark' : 'light';
                setTheme(newTheme);
                localStorage.setItem('theme', newTheme);
                document.documentElement.classList.toggle('dark', newTheme === 'dark');
            };
            
            const handleUpdateSchedule = useCallback(async (newSchedule) => {
                 if (!user || !db) return;
                 try {
                     await setDoc(doc(db, 'schedules', user.uid), { schedule: newSchedule, version: SCHEDULE_VERSION });
                 } catch (error) {
                     console.error("Error saving schedule:", error);
                 }
            }, [user, db]);

            const handleAddLesson = (weekIndex, moduleIndex, lessonName, isBonus) => {
                const newSchedule = JSON.parse(JSON.stringify(schedule));
                const week = newSchedule[weekIndex];
                if (week) {
                    const module = week.modules[moduleIndex];
                    const lessonList = isBonus ? module.bonusLessons : module.lessons;
                    
                    const newLesson = {
                        name: lessonName,
                        id: `${isBonus ? 'B' : ''}${module.code.replace(/\s/g, '')}-${lessonName.replace(/[^a-zA-Z0-9]/g, '')}-${Date.now()}`
                    };
                    lessonList.push(newLesson);
                    setSchedule(newSchedule);
                    handleUpdateSchedule(newSchedule);
                }
            };
            
            const handleRemoveLesson = (weekIndex, moduleIndex, lessonIndex, isBonus) => {
                if (!confirm('Tem certeza que deseja remover esta aula?')) return;
                const newSchedule = JSON.parse(JSON.stringify(schedule));
                const week = newSchedule[weekIndex];
                if (week) {
                    const module = week.modules[moduleIndex];
                    const lessonList = isBonus ? module.bonusLessons : module.lessons;
                    lessonList.splice(lessonIndex, 1);
                    setSchedule(newSchedule);
                    handleUpdateSchedule(newSchedule);
                }
            };

            const handleToggle = useCallback(async (lessonId, checkType) => {
                if (!user || !db) { alert("Conexão com banco de dados falhou."); return; }
                const newProgress = JSON.parse(JSON.stringify(progress));
                if (!newProgress[lessonId]) newProgress[lessonId] = {};
                newProgress[lessonId][checkType] = !newProgress[lessonId][checkType];
                setProgress(newProgress);
                try { await setDoc(doc(db, 'progress', user.uid), newProgress, { merge: true }); } 
                catch (error) { console.error("Error saving progress: ", error); }
            }, [progress, user, db]);

            const filteredSchedule = useMemo(() => {
                if (!schedule) return [];
                return schedule.map(week => ({
                    ...week,
                    modules: week.modules
                        .filter(module => !filter || module.discipline === filter)
                        .map(module => {
                            if (!searchTerm) return module;

                            const searchLower = searchTerm.toLowerCase();
                            const moduleInfoMatches = module.discipline.toLowerCase().includes(searchLower) || module.title.toLowerCase().includes(searchLower);

                            const filteredLessons = module.lessons.filter(lesson => lesson.name.toLowerCase().includes(searchLower));
                            const filteredBonusLessons = (module.bonusLessons || []).filter(lesson => lesson.name.toLowerCase().includes(searchLower));

                            if (moduleInfoMatches || filteredLessons.length > 0 || filteredBonusLessons.length > 0) {
                                return {
                                    ...module,
                                    lessons: moduleInfoMatches ? module.lessons : filteredLessons,
                                    bonusLessons: moduleInfoMatches ? module.bonusLessons : filteredBonusLessons
                                };
                            }
                            return null;
                        })
                        .filter(Boolean)
                })).filter(week => week.modules.length > 0);
            }, [schedule, searchTerm, filter]);
            
            const activeWeekData = useMemo(() => schedule ? schedule.find(w => w.week === activeWeek) : null, [schedule, activeWeek]);
            const isFilteredOrMobile = searchTerm || filter || (typeof window !== 'undefined' && window.innerWidth < 768);

            const renderContent = () => {
                if (!schedule || schedule.length === 0) return null;
                if (isFilteredOrMobile) {
                    return (
                        <div className="space-y-4">
                            {filteredSchedule.length > 0 ? (
                                filteredSchedule.map(week => (
                                    <div key={week.week} className="p-4 rounded-xl bg-slate-100 dark:bg-slate-900/50">
                                        <h3 className="text-xl font-bold mb-3 text-slate-800 dark:text-slate-100">Semana {String(week.week).padStart(2, '0')}</h3>
                                        <div className="space-y-4">
                                            {week.modules.map((module, moduleIndex) => (
                                                <ModuleCard key={`${module.code}-${week.week}`} module={module} weekIndex={schedule.findIndex(w => w.week === week.week)} moduleIndex={moduleIndex} progress={progress} onToggle={handleToggle} onAddLesson={handleAddLesson} onRemoveLesson={handleRemoveLesson} />
                                            ))}
                                        </div>
                                    </div>
                                ))
                            ) : (
                                <div className="text-center py-16 px-6 bg-white dark:bg-slate-800 rounded-2xl shadow-md">
                                    <Icon name="SearchX" className="mx-auto w-16 h-16 text-slate-400 dark:text-slate-500 mb-4" />
                                    <h3 className="text-xl font-semibold text-slate-800 dark:text-slate-100">Nenhum resultado encontrado</h3>
                                    <p className="text-slate-500 dark:text-slate-400 mt-2">Tente ajustar seus termos de busca ou filtros.</p>
                                </div>
                            )}
                        </div>
                    );
                }
                
                return (
                    activeWeekData && (
                        <div className="space-y-5">
                             <h3 className="text-2xl font-bold text-slate-800 dark:text-slate-100">Semana {String(activeWeekData.week).padStart(2, '0')}</h3>
                             {activeWeekData.modules.map((module, moduleIndex) => (
                                <ModuleCard key={module.code} module={module} weekIndex={activeWeek - 1} moduleIndex={moduleIndex} progress={progress} onToggle={handleToggle} onAddLesson={handleAddLesson} onRemoveLesson={handleRemoveLesson}/>
                             ))}
                        </div>
                    )
                );
            };

            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-slate-50 dark:bg-slate-950">
                        <div className="flex items-center gap-4">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-sky-500"></div>
                            <span className="text-xl font-semibold text-slate-700 dark:text-slate-300">Carregando seus estudos...</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col bg-slate-100 dark:bg-slate-900">
                    {showWelcome && <WelcomeModal onClose={() => setShowWelcome(false)} />}
                    <Header onSearch={setSearchTerm} onFilter={setFilter} onThemeToggle={handleThemeToggle} currentTheme={theme} />
                    <div className="flex-1 flex overflow-hidden">
                        {!isFilteredOrMobile && schedule && <Sidebar weeks={schedule} activeWeek={activeWeek} onSelectWeek={setActiveWeek} />}
                        <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
                           {renderContent()}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<body class="antialiased font-sans transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        const { initializeApp } = window.firebase;
        const { getAuth, signInAnonymously } = window.firebase;
        const { getFirestore, doc, setDoc, onSnapshot } = window.firebase;
        
        // --- DATA ---
        // Fallback data in case scheduleData.js is not loaded
        const minimalInitialSchedule = {
            disciplineMapping: {'EX': 'Exemplo'},
            get disciplines() { return ['Exemplo']; },
            apostilasData: { "EX 01": { bonusLessons: ["Aula Bônus Exemplo"] } },
            weeklyLayout: [
                { week: 1, modules: [ { code: "EX 01", title: "Carregamento Falhou", lessons: ["Verifique sua conexão", "Tente recarregar a página"] } ] }
            ]
        };

        const { disciplines, apostilasData, weeklyLayout, disciplineMapping } = window.scheduleData || minimalInitialSchedule;
        const SCHEDULE_VERSION = "1.4_universal_user_fix";
        const UNIVERSAL_USER_ID = "universal_checklist_data";
        
        // --- COMPONENTES ---

        const Icon = ({ name, ...props }) => {
            if (!window.lucide || !window.lucide[name]) return <span className="w-6 h-6 inline-block" />;
            return React.createElement(window.lucide[name], props);
        };
        
        const ChecklistItem = ({ lessonId, progress, onToggle }) => {
            const checklistOptions = [
                { id: 'aula', label: 'Aula', icon: 'Youtube' }, { id: 'anki', label: 'Anki', icon: 'Copy' },
                { id: 'exercicios', label: 'Exercícios', icon: 'ClipboardCheck' }, { id: 'revisao', label: 'Revisão', icon: 'Repeat' }
            ];
            return (
                <div className="flex flex-shrink-0 flex-wrap items-center justify-start sm:justify-end gap-1 sm:gap-2 mt-2 sm:mt-0">
                    {checklistOptions.map(opt => {
                        const isChecked = progress && progress[opt.id];
                        return (
                             <button key={opt.id} title={opt.label} onClick={() => onToggle(lessonId, opt.id)}
                                className={`flex items-center gap-2 cursor-pointer p-2 rounded-lg transition-all duration-200 border-2 ${isChecked ? 'bg-sky-500/10 border-sky-500/30 text-sky-400' : 'bg-transparent border-transparent hover:bg-slate-200 dark:hover:bg-slate-700/60 text-slate-500 dark:text-slate-400'}`}>
                                <Icon name={opt.icon} className={`w-5 h-5`} />
                                <span className={`text-sm font-semibold hidden lg:inline`}>{opt.label}</span>
                            </button>
                        );
                    })}
                </div>
            );
        };
        
        const AddLessonForm = ({ onAddLesson, onCancel }) => {
            const [lessonName, setLessonName] = useState('');
            const inputRef = useRef(null);

            useEffect(() => { inputRef.current?.focus(); }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (lessonName.trim()) {
                    onAddLesson(lessonName.trim());
                    setLessonName('');
                }
            };

            return (
                <form onSubmit={handleSubmit} className="flex items-center gap-2 p-2 rounded-lg bg-slate-100 dark:bg-slate-800/50">
                    <input ref={inputRef} type="text" value={lessonName} onChange={(e) => setLessonName(e.target.value)} placeholder="Nome da nova aula"
                        className="flex-grow bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md px-3 py-1.5 text-sm focus:ring-2 focus:ring-sky-500 focus:outline-none"/>
                    <button type="submit" className="p-2 rounded-md bg-sky-500 text-white hover:bg-sky-600 transition-colors"><Icon name="Check" className="w-4 h-4"/></button>
                    <button type="button" onClick={onCancel} className="p-2 rounded-md bg-slate-200 dark:bg-slate-600 hover:bg-slate-300 dark:hover:bg-slate-500 transition-colors"><Icon name="X" className="w-4 h-4"/></button>
                </form>
            );
        };

        const ModuleCard = ({ module, weekIndex, moduleIndex, progress, onToggle, onAddLesson, onRemoveLesson }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [isBonusAdding, setIsBonusAdding] = useState(false);
            const [isBonusVisible, setIsBonusVisible] = useState(true);

            const calculateProgress = (lessons) => {
                if (!lessons || lessons.length === 0) return { completed: 0, total: 0 };
                const totalItems = lessons.length * 4;
                const completedItems = lessons.reduce((acc, lesson) => {
                    const lessonProgress = progress[lesson.id] || {};
                    return acc + Object.values(lessonProgress).filter(Boolean).length;
                }, 0);
                return { completed: completedItems, total: totalItems };
            }

            const mainProgress = calculateProgress(module.lessons);
            const bonusProgress = calculateProgress(module.bonusLessons);
            const totalCompleted = mainProgress.completed + bonusProgress.completed;
            const totalItems = mainProgress.total + bonusProgress.total;
            const progressPercentage = totalItems > 0 ? (totalCompleted / totalItems) * 100 : 0;

            const handleAddLesson = (lessonName, isBonus = false) => {
                onAddLesson(weekIndex, moduleIndex, lessonName, isBonus);
                if (isBonus) setIsBonusAdding(false);
                else setIsAdding(false);
            }

            const LessonList = ({ lessons, isBonus = false }) => (
                <ul className="space-y-1">
                    {lessons.map((lesson, lessonIndex) => (
                       <li key={lesson.id} className="group flex flex-col sm:flex-row justify-between sm:items-center p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700/40 transition-colors">
                           <p className="text-sm font-medium text-slate-700 dark:text-slate-300 flex-grow mr-2 min-w-0 truncate">{lesson.name}</p>
                           <div className="flex items-center gap-2">
                               <ChecklistItem lessonId={lesson.id} progress={progress[lesson.id]} onToggle={onToggle} />
                               <button onClick={() => onRemoveLesson(weekIndex, moduleIndex, lessonIndex, isBonus)} className="p-1.5 rounded-full text-slate-400 hover:bg-red-100 hover:text-red-500 dark:hover:bg-red-900/50 opacity-0 group-hover:opacity-100 transition-opacity">
                                   <Icon name="Trash2" className="w-4 h-4"/>
                               </button>
                           </div>
                       </li>
                    ))}
                </ul>
            );

            return (
                <div className="bg-white dark:bg-slate-800/80 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                    <div className="flex justify-between items-center mb-3">
                        <div>
                            <span className="text-xs font-bold uppercase text-sky-500 dark:text-sky-400 tracking-wider">{module.discipline} - {module.code}</span>
                            <h4 className="font-bold text-slate-800 dark:text-slate-100">{module.title}</h4>
                        </div>
                        <span className="text-sm font-semibold text-slate-500 dark:text-slate-400">{Math.round(progressPercentage)}%</span>
                    </div>
                    <div className="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2 mb-4">
                        <div className="bg-sky-500 h-2 rounded-full transition-all duration-300" style={{ width: `${progressPercentage}%` }}></div>
                    </div>
                    
                    <LessonList lessons={module.lessons} />
                    <div className="mt-3">
                        {isAdding ? <AddLessonForm onAddLesson={(name) => handleAddLesson(name, false)} onCancel={() => setIsAdding(false)} />
                        : <button onClick={() => setIsAdding(true)} className="w-full text-sm font-semibold text-sky-600 dark:text-sky-400 hover:bg-sky-50 dark:hover:bg-sky-900/50 p-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                               <Icon name="PlusCircle" className="w-4 h-4"/> Adicionar Aula
                           </button>
                        }
                    </div>

                    {module.bonusLessons && module.bonusLessons.length > 0 && (
                        <div className="mt-4 pt-4 border-t border-slate-200 dark:border-slate-700">
                            <button onClick={() => setIsBonusVisible(!isBonusVisible)} className="w-full flex justify-between items-center p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700/60">
                                <h5 className="font-bold text-slate-600 dark:text-slate-300">Aulas Bônus</h5>
                                <Icon name={isBonusVisible ? "ChevronUp" : "ChevronDown"} className="w-5 h-5 text-slate-500"/>
                            </button>
                            {isBonusVisible && (
                                <div className="mt-2 pl-2 border-l-2 border-sky-200 dark:border-sky-800">
                                    <LessonList lessons={module.bonusLessons} isBonus={true} />
                                     <div className="mt-3">
                                        {isBonusAdding ? <AddLessonForm onAddLesson={(name) => handleAddLesson(name, true)} onCancel={() => setIsBonusAdding(false)} />
                                        : <button onClick={() => setIsBonusAdding(true)} className="w-full text-sm font-semibold text-sky-600 dark:text-sky-400 hover:bg-sky-50 dark:hover:bg-sky-900/50 p-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                                                <Icon name="PlusCircle" className="w-4 h-4"/> Adicionar Aula Bônus
                                            </button>
                                        }
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            )
        }
        
        const Header = ({ onSearch, onFilter, onThemeToggle, currentTheme }) => (
            <header className="sticky top-0 z-40 bg-white/80 dark:bg-slate-950/80 backdrop-blur-lg border-b border-slate-200 dark:border-slate-800 py-3 px-4 sm:px-6">
                <div className="flex items-center justify-between gap-4">
                    <div className="flex items-center gap-3 flex-shrink-0">
                        <div className="bg-sky-500 p-2 rounded-lg"><Icon name="ClipboardCheck" className="w-6 h-6 text-white" /></div>
                        <h1 className="text-lg sm:text-xl font-bold text-slate-800 dark:text-slate-100 hidden sm:block">Checklist Medcurso</h1>
                    </div>
                    <div className="flex-1 flex justify-center min-w-0 px-4">
                        <div className="relative w-full max-w-lg">
                            <Icon name="Search" className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" />
                            <input type="text" placeholder="Buscar aula ou disciplina..." onChange={(e) => onSearch(e.target.value)} className="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors" />
                        </div>
                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0">
                        <select onChange={(e) => onFilter(e.target.value)} className="py-2 px-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors appearance-none hidden md:block">
                            <option value="">Todas</option>
                            {disciplines.map(d => <option key={d} value={d} className="dark:bg-slate-800">{d}</option>)}
                        </select>
                        <button onClick={onThemeToggle} title="Mudar tema" className="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                            <Icon name={currentTheme === 'dark' ? 'Sun' : 'Moon'} className="w-6 h-6 text-slate-600 dark:text-slate-300" />
                        </button>
                    </div>
                </div>
            </header>
        );

        const Sidebar = ({ weeks, activeWeek, onSelectWeek }) => (
             <aside className="w-60 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex-col hidden md:flex">
                 <div className="p-4 border-b border-slate-200 dark:border-slate-800">
                     <h2 className="font-bold text-lg text-slate-800 dark:text-slate-100">Semanas</h2>
                 </div>
                 <nav className="flex-1 overflow-y-auto p-2 space-y-1">
                     {weeks.map(week => (
                         <button 
                            key={week.week} 
                            onClick={() => onSelectWeek(week.week)}
                            className={`w-full text-left px-3 py-2 rounded-md text-sm font-medium transition-colors ${activeWeek === week.week ? 'bg-sky-100 text-sky-700 dark:bg-sky-900/50 dark:text-sky-300' : 'hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400'}`}
                         >
                             Semana {String(week.week).padStart(2, '0')}
                         </button>
                     ))}
                 </nav>
             </aside>
        );

        const App = () => {
            const [schedule, setSchedule] = useState(null);
            const [progress, setProgress] = useState({});
            const [searchTerm, setSearchTerm] = useState('');
            const [filter, setFilter] = useState('');
            const [theme, setTheme] = useState('light');
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showWelcome, setShowWelcome] = useState(false);
            const [activeWeek, setActiveWeek] = useState(1);
            
            const firebaseConfig = {
                apiKey: "AIzaSyCvqp5HYUMnogWmwT0O1LFLOMsfqj9P83s",
                authDomain: "med-heklp.firebaseapp.com",
                projectId: "med-heklp",
                storageBucket: "med-heklp.appspot.com",
                messagingSenderId: "675054342845",
                appId: "1:675054342845:web:91e53e21060a087123ddd4",
                measurementId: "G-BLWYTWFFTZ"
            };

            const processInitialSchedule = useCallback(() => {
                const sourceLayout = window.scheduleData ? window.scheduleData.weeklyLayout : minimalInitialSchedule.weeklyLayout;
                const sourceApostilas = window.scheduleData ? window.scheduleData.apostilasData : minimalInitialSchedule.apostilasData;
                const sourceMapping = window.scheduleData ? window.scheduleData.disciplineMapping : minimalInitialSchedule.disciplineMapping;
                
                return sourceLayout.map(weekInfo => ({
                    ...weekInfo,
                    modules: weekInfo.modules.map(module => ({
                        ...module,
                        discipline: sourceMapping[module.code.split(' ')[0]] || 'Desconhecida',
                        lessons: module.lessons.map(lessonName => ({
                            name: lessonName,
                            id: `W${weekInfo.week}-${module.code.replace(/\s/g, '')}-${lessonName.replace(/[^a-zA-Z0-9]/g, '')}`
                        })),
                        bonusLessons: (sourceApostilas[module.code]?.bonusLessons || []).map(lessonName => ({
                            name: lessonName,
                            id: `B-${module.code.replace(/\s/g, '')}-${lessonName.replace(/[^a-zA-Z0-9]/g, '')}`
                        }))
                    }))
                }));
            }, []);

            useEffect(() => {
                try {
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    signInAnonymously(auth).catch(e => console.error("Anonymous sign-in error", e));
                    const firestore = getFirestore(app);
                    setDb(firestore);
                } catch (e) { console.error("Firebase init error:", e); setLoading(false); }
                
                if (!localStorage.getItem('hasVisitedMedChecklistV6')) {
                    setShowWelcome(true);
                    localStorage.setItem('hasVisitedMedChecklistV6', 'true');
                }
            }, []);

            useEffect(() => {
                if (!db) return;

                const progressDocRef = doc(db, 'progress', UNIVERSAL_USER_ID);
                const scheduleDocRef = doc(db, 'schedules', UNIVERSAL_USER_ID);

                const unsubProgress = onSnapshot(progressDocRef, (docSnap) => {
                    if (docSnap.exists()) setProgress(docSnap.data());
                }, (error) => console.error("Progress snapshot error: ", error));

                const unsubSchedule = onSnapshot(scheduleDocRef, (docSnap) => {
                    if (docSnap.exists() && docSnap.data().schedule && docSnap.data().version === SCHEDULE_VERSION) {
                        setSchedule(docSnap.data().schedule);
                    } else {
                        console.log("Outdated or no custom schedule found. Initializing/updating with default.");
                        const processedSchedule = processInitialSchedule();
                        setDoc(scheduleDocRef, { schedule: processedSchedule, version: SCHEDULE_VERSION });
                        setSchedule(processedSchedule);
                    }
                    setLoading(false);
                }, (error) => { 
                    console.error("Schedule snapshot error: ", error); 
                    setSchedule(processInitialSchedule());
                    setLoading(false); 
                });

                return () => {
                    unsubProgress();
                    unsubSchedule();
                };
            }, [db, processInitialSchedule]);

            useEffect(() => {
                const savedTheme = localStorage.getItem('theme') || 'light';
                setTheme(savedTheme);
                document.documentElement.classList.toggle('dark', savedTheme === 'dark');
            }, []);

            const handleThemeToggle = () => {
                const newTheme = theme === 'light' ? 'dark' : 'light';
                setTheme(newTheme);
                localStorage.setItem('theme', newTheme);
                document.documentElement.classList.toggle('dark', newTheme === 'dark');
            };
            
            const handleUpdateSchedule = useCallback(async (newSchedule) => {
                 if (!db) return;
                 try {
                     await setDoc(doc(db, 'schedules', UNIVERSAL_USER_ID), { schedule: newSchedule, version: SCHEDULE_VERSION });
                 } catch (error) {
                     console.error("Error saving schedule:", error);
                 }
            }, [db]);

            const handleAddLesson = (weekIndex, moduleIndex, lessonName, isBonus) => {
                const newSchedule = JSON.parse(JSON.stringify(schedule));
                const week = newSchedule[weekIndex];
                if (week) {
                    const module = week.modules[moduleIndex];
                    const lessonList = isBonus ? module.bonusLessons : module.lessons;
                    
                    const newLesson = {
                        name: lessonName,
                        id: `${isBonus ? 'B-' : `W${week.week}-`}${module.code.replace(/\s/g, '')}-${lessonName.replace(/[^a-zA-Z0-9]/g, '')}-${Date.now()}`
                    };
                    lessonList.push(newLesson);
                    setSchedule(newSchedule);
                    handleUpdateSchedule(newSchedule);
                }
            };
            
            const handleRemoveLesson = (weekIndex, moduleIndex, lessonIndex, isBonus) => {
                if (!confirm('Tem certeza que deseja remover esta aula?')) return;
                const newSchedule = JSON.parse(JSON.stringify(schedule));
                const week = newSchedule[weekIndex];
                if (week) {
                    const module = week.modules[moduleIndex];
                    const lessonList = isBonus ? module.bonusLessons : module.lessons;
                    lessonList.splice(lessonIndex, 1);
                    setSchedule(newSchedule);
                    handleUpdateSchedule(newSchedule);
                }
            };

            const handleToggle = useCallback(async (lessonId, checkType) => {
                if (!db) { alert("Conexão com banco de dados falhou."); return; }
                const newProgress = JSON.parse(JSON.stringify(progress));
                if (!newProgress[lessonId]) newProgress[lessonId] = {};
                newProgress[lessonId][checkType] = !newProgress[lessonId][checkType];
                setProgress(newProgress);
                try { await setDoc(doc(db, 'progress', UNIVERSAL_USER_ID), newProgress, { merge: true }); } 
                catch (error) { console.error("Error saving progress: ", error); }
            }, [progress, db]);

            const filteredSchedule = useMemo(() => {
                if (!schedule) return [];
                return schedule.map(week => ({
                    ...week,
                    modules: week.modules
                        .filter(module => !filter || module.discipline === filter)
                        .map(module => {
                            if (!searchTerm) return module;

                            const searchLower = searchTerm.toLowerCase();
                            const moduleInfoMatches = module.discipline.toLowerCase().includes(searchLower) || module.title.toLowerCase().includes(searchLower);

                            const filteredLessons = module.lessons.filter(lesson => lesson.name.toLowerCase().includes(searchLower));
                            const filteredBonusLessons = (module.bonusLessons || []).filter(lesson => lesson.name.toLowerCase().includes(searchLower));

                            if (moduleInfoMatches || filteredLessons.length > 0 || filteredBonusLessons.length > 0) {
                                return {
                                    ...module,
                                    lessons: moduleInfoMatches ? module.lessons : filteredLessons,
                                    bonusLessons: moduleInfoMatches ? module.bonusLessons : filteredBonusLessons
                                };
                            }
                            return null;
                        })
                        .filter(Boolean)
                })).filter(week => week.modules.length > 0);
            }, [schedule, searchTerm, filter]);
            
            const activeWeekData = useMemo(() => schedule ? schedule.find(w => w.week === activeWeek) : null, [schedule, activeWeek]);
            const isFilteredOrMobile = searchTerm || filter || (typeof window !== 'undefined' && window.innerWidth < 768);

            const renderContent = () => {
                if (!schedule || schedule.length === 0) return null;
                if (isFilteredOrMobile) {
                    return (
                        <div className="space-y-4">
                            {filteredSchedule.length > 0 ? (
                                filteredSchedule.map(week => (
                                    <div key={week.week} className="p-4 rounded-xl bg-slate-100 dark:bg-slate-900/50">
                                        <h3 className="text-xl font-bold mb-3 text-slate-800 dark:text-slate-100">Semana {String(week.week).padStart(2, '0')}</h3>
                                        <div className="space-y-4">
                                            {week.modules.map((module, moduleIndex) => (
                                                <ModuleCard key={`${module.code}-${week.week}`} module={module} weekIndex={schedule.findIndex(w => w.week === week.week)} moduleIndex={moduleIndex} progress={progress} onToggle={handleToggle} onAddLesson={handleAddLesson} onRemoveLesson={handleRemoveLesson} />
                                            ))}
                                        </div>
                                    </div>
                                ))
                            ) : (
                                <div className="text-center py-16 px-6 bg-white dark:bg-slate-800 rounded-2xl shadow-md">
                                    <Icon name="SearchX" className="mx-auto w-16 h-16 text-slate-400 dark:text-slate-500 mb-4" />
                                    <h3 className="text-xl font-semibold text-slate-800 dark:text-slate-100">Nenhum resultado encontrado</h3>
                                    <p className="text-slate-500 dark:text-slate-400 mt-2">Tente ajustar seus termos de busca ou filtros.</p>
                                </div>
                            )}
                        </div>
                    );
                }
                
                return (
                    activeWeekData && (
                        <div className="space-y-5">
                             <h3 className="text-2xl font-bold text-slate-800 dark:text-slate-100">Semana {String(activeWeekData.week).padStart(2, '0')}</h3>
                             {activeWeekData.modules.map((module, moduleIndex) => (
                                <ModuleCard key={module.code} module={module} weekIndex={activeWeek - 1} moduleIndex={moduleIndex} progress={progress} onToggle={handleToggle} onAddLesson={handleAddLesson} onRemoveLesson={handleRemoveLesson}/>
                             ))}
                        </div>
                    )
                );
            };

            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-slate-50 dark:bg-slate-950">
                        <div className="flex items-center gap-4">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-sky-500"></div>
                            <span className="text-xl font-semibold text-slate-700 dark:text-slate-300">Carregando seus estudos...</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col bg-slate-100 dark:bg-slate-900">
                    <Header onSearch={setSearchTerm} onFilter={setFilter} onThemeToggle={handleThemeToggle} currentTheme={theme} />
                    <div className="flex-1 flex overflow-hidden">
                        {!isFilteredOrMobile && schedule && <Sidebar weeks={schedule} activeWeek={activeWeek} onSelectWeek={setActiveWeek} />}
                        <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
                           {renderContent()}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
