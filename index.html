<body class="antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        const { initializeApp } = window.firebase;
        const { getAuth, signInAnonymously } = window.firebase;
        const { getFirestore, doc, setDoc, onSnapshot } = window.firebase;
        
        // --- DATA ---
        const minimalInitialSchedule = {
            disciplineMapping: {'EX': 'Exemplo'},
            get disciplines() { return ['Exemplo']; },
            apostilasData: { "EX 01": { bonusLessons: ["Aula Bônus Exemplo"] } },
            weeklyLayout: [ { week: 1, modules: [ { code: "EX 01", title: "Carregamento Falhou", lessons: ["Verifique sua conexão", "Tente recarregar a página"] } ] } ]
        };

        const { disciplines, apostilasData, weeklyLayout, disciplineMapping } = window.scheduleData || minimalInitialSchedule;
        const SCHEDULE_VERSION = "1.6_mobile_nav";
        const UNIVERSAL_USER_ID = "universal_checklist_data";
        
        // --- COMPONENTES ---
        const SvgIcon = ({ name, className }) => {
            const icons = {
                ClipboardCheck: <><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="m9 14 2 2 4-4"/></>,
                Search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
                Youtube: <><path d="M2.5 17a24.12 24.12 0 0 1 0-10C2.5 6 4.5 4 7 4h10a4.5 4.5 0 0 1 4.5 4.5v0A4.5 4.5 0 0 1 17 13H7a4.5 4.5 0 0 1-4.5 4.5v0Z"/><path d="M14 10.5v-1a2 2 0 1 1 4 0v1"/></>,
                Copy: <><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>,
                Repeat: <><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></>,
                Check: <><path d="M20 6 9 17l-5-5"/></>,
                X: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
                PlusCircle: <><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></>,
                ChevronUp: <><path d="m18 15-6-6-6 6"/></>,
                ChevronDown: <><path d="m6 9 6 6 6-6"/></>,
                Trash2: <><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M10 11v6"/><path d="M14 11v6"/></>,
                SearchX: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="m13.5 8.5-5 5"/><path d="m8.5 8.5 5 5"/></>,
            };
            return <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };
        
        const ChecklistItem = ({ lessonId, progress, onToggle }) => {
            const checklistOptions = [
                { id: 'aula', label: 'Aula', icon: 'Youtube' }, { id: 'anki', label: 'Anki', icon: 'Copy' },
                { id: 'exercicios', label: 'Exercícios', icon: 'ClipboardCheck' }, { id: 'revisao', label: 'Revisão', icon: 'Repeat' }
            ];
            return (
                <div className="flex flex-shrink-0 flex-wrap items-center justify-start sm:justify-end gap-1 sm:gap-2 mt-2 sm:mt-0">
                    {checklistOptions.map(opt => {
                        const isChecked = progress && progress[opt.id];
                        return (
                             <button key={opt.id} title={opt.label} onClick={() => onToggle(lessonId, opt.id)}
                                className={`flex items-center gap-2 cursor-pointer p-2 rounded-lg transition-all duration-200 border-2 ${isChecked ? 'bg-sky-500/10 border-sky-500/30 text-sky-400' : 'bg-transparent border-transparent hover:bg-slate-700/60 text-slate-400'}`}>
                                <SvgIcon name={opt.icon} className="w-5 h-5" />
                                <span className={`text-sm font-semibold hidden lg:inline`}>{opt.label}</span>
                            </button>
                        );
                    })}
                </div>
            );
        };
        
        const AddLessonForm = ({ onAddLesson, onCancel }) => {
            const [lessonName, setLessonName] = useState('');
            const inputRef = useRef(null);
            useEffect(() => { inputRef.current?.focus(); }, []);
            const handleSubmit = (e) => {
                e.preventDefault();
                if (lessonName.trim()) { onAddLesson(lessonName.trim()); setLessonName(''); }
            };
            return (
                <form onSubmit={handleSubmit} className="flex items-center gap-2 p-2 rounded-lg bg-slate-800/50">
                    <input ref={inputRef} type="text" value={lessonName} onChange={(e) => setLessonName(e.target.value)} placeholder="Nome da nova aula"
                        className="flex-grow bg-slate-700 border border-slate-600 rounded-md px-3 py-1.5 text-sm focus:ring-2 focus:ring-sky-500 focus:outline-none"/>
                    <button type="submit" className="p-2 rounded-md bg-sky-500 text-white hover:bg-sky-600 transition-colors"><SvgIcon name="Check" className="w-4 h-4"/></button>
                    <button type="button" onClick={onCancel} className="p-2 rounded-md bg-slate-600 hover:bg-slate-500 transition-colors"><SvgIcon name="X" className="w-4 h-4"/></button>
                </form>
            );
        };

        const ModuleCard = ({ module, weekIndex, moduleIndex, progress, onToggle, onAddLesson, onRemoveLesson }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [isBonusAdding, setIsBonusAdding] = useState(false);
            const [isBonusVisible, setIsBonusVisible] = useState(true);

            const calculateProgress = (lessons) => {
                if (!lessons || lessons.length === 0) return { completed: 0, total: 0 };
                const totalItems = lessons.length * 4;
                const completedItems = lessons.reduce((acc, lesson) => {
                    const lessonProgress = progress[lesson.id] || {};
                    return acc + Object.values(lessonProgress).filter(Boolean).length;
                }, 0);
                return { completed: completedItems, total: totalItems };
            }

            const mainProgress = calculateProgress(module.lessons);
            const bonusProgress = calculateProgress(module.bonusLessons);
            const totalCompleted = mainProgress.completed + bonusProgress.completed;
            const totalItems = mainProgress.total + bonusProgress.total;
            const progressPercentage = totalItems > 0 ? (totalCompleted / totalItems) * 100 : 0;

            const handleAddLesson = (lessonName, isBonus = false) => {
                onAddLesson(weekIndex, moduleIndex, lessonName, isBonus);
                if (isBonus) setIsBonusAdding(false); else setIsAdding(false);
            }

            const LessonList = ({ lessons, isBonus = false }) => (
                <ul className="space-y-1">
                    {lessons.map((lesson, lessonIndex) => (
                       <li key={lesson.id} className="group flex flex-col sm:flex-row justify-between sm:items-center p-2 rounded-lg hover:bg-slate-700/40 transition-colors">
                           <p className="text-sm font-medium text-slate-300 flex-grow mr-2 min-w-0 truncate">{lesson.name}</p>
                           <div className="flex items-center gap-2">
                               <ChecklistItem lessonId={lesson.id} progress={progress[lesson.id]} onToggle={onToggle} />
                               <button onClick={() => onRemoveLesson(weekIndex, moduleIndex, lessonIndex, isBonus)} className="p-1.5 rounded-full text-slate-400 hover:bg-red-900/50 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                   <SvgIcon name="Trash2" className="w-4 h-4"/>
                               </button>
                           </div>
                       </li>
                    ))}
                </ul>
            );

            return (
                <div className="bg-slate-800/80 p-4 rounded-xl border border-slate-700 shadow-sm">
                    <div className="flex justify-between items-center mb-3">
                        <div>
                            <span className="text-xs font-bold uppercase text-sky-400 tracking-wider">{module.discipline} - {module.code}</span>
                            <h4 className="font-bold text-slate-100">{module.title}</h4>
                        </div>
                        <span className="text-sm font-semibold text-slate-400">{Math.round(progressPercentage)}%</span>
                    </div>
                    <div className="w-full bg-slate-700 rounded-full h-2 mb-4">
                        <div className="bg-sky-500 h-2 rounded-full transition-all duration-300" style={{ width: `${progressPercentage}%` }}></div>
                    </div>
                    <LessonList lessons={module.lessons} />
                    <div className="mt-3">
                        {isAdding ? <AddLessonForm onAddLesson={(name) => handleAddLesson(name, false)} onCancel={() => setIsAdding(false)} />
                        : <button onClick={() => setIsAdding(true)} className="w-full text-sm font-semibold text-sky-400 hover:bg-sky-900/50 p-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                               <SvgIcon name="PlusCircle" className="w-4 h-4"/> Adicionar Aula
                           </button>
                        }
                    </div>

                    {module.bonusLessons && module.bonusLessons.length > 0 && (
                        <div className="mt-4 pt-4 border-t border-slate-700">
                            <button onClick={() => setIsBonusVisible(!isBonusVisible)} className="w-full flex justify-between items-center p-2 rounded-lg hover:bg-slate-700/60">
                                <h5 className="font-bold text-slate-300">Aulas Bônus</h5>
                                <SvgIcon name={isBonusVisible ? "ChevronUp" : "ChevronDown"} className="w-5 h-5 text-slate-400"/>
                            </button>
                            {isBonusVisible && (
                                <div className="mt-2 pl-2 border-l-2 border-sky-800">
                                    <LessonList lessons={module.bonusLessons} isBonus={true} />
                                     <div className="mt-3">
                                        {isBonusAdding ? <AddLessonForm onAddLesson={(name) => handleAddLesson(name, true)} onCancel={() => setIsBonusAdding(false)} />
                                        : <button onClick={() => setIsBonusAdding(true)} className="w-full text-sm font-semibold text-sky-400 hover:bg-sky-900/50 p-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                                                <SvgIcon name="PlusCircle" className="w-4 h-4"/> Adicionar Aula Bônus
                                            </button>
                                        }
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            )
        }
        
        const Header = ({ onSearch, onFilter, weeks, activeWeek, onSelectWeek }) => (
            <header className="sticky top-0 z-40 bg-slate-950/80 backdrop-blur-lg border-b border-slate-800 py-3 px-4 sm:px-6">
                <div className="flex items-center justify-between gap-4">
                    <div className="flex items-center gap-3 flex-shrink-0">
                        <div className="bg-sky-500 p-2 rounded-lg"><SvgIcon name="ClipboardCheck" className="w-6 h-6 text-white" /></div>
                        <h1 className="text-lg sm:text-xl font-bold text-slate-100 hidden sm:block">Checklist Medcurso</h1>
                    </div>
                    <div className="flex-1 flex justify-center min-w-0 px-4">
                        <div className="relative w-full max-w-lg">
                            <SvgIcon name="Search" className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" />
                            <input type="text" placeholder="Buscar aula ou disciplina..." onChange={(e) => onSearch(e.target.value)} className="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-700 bg-slate-800 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors" />
                        </div>
                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0">
                        <select onChange={(e) => onSelectWeek(parseInt(e.target.value, 10))} value={activeWeek} className="py-2 px-3 rounded-lg border border-slate-700 bg-slate-800 text-slate-200 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors md:hidden">
                            {weeks.map(w => <option key={w.week} value={w.week}>Semana {String(w.week).padStart(2, '0')}</option>)}
                        </select>
                        <select onChange={(e) => onFilter(e.target.value)} className="py-2 px-3 rounded-lg border border-slate-700 bg-slate-800 text-slate-200 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors hidden md:block">
                            <option value="">Todas</option>
                            {disciplines.map(d => <option key={d} value={d}>{d}</option>)}
                        </select>
                    </div>
                </div>
            </header>
        );

        const Sidebar = ({ weeks, activeWeek, onSelectWeek }) => (
             <aside className="w-60 bg-slate-900 border-r border-slate-800 flex-col hidden md:flex">
                 <div className="p-4 border-b border-slate-800">
                     <h2 className="font-bold text-lg text-slate-100">Semanas</h2>
                 </div>
                 <nav className="flex-1 overflow-y-auto p-2 space-y-1">
                     {weeks.map(week => (
                         <button 
                            key={week.week} 
                            onClick={() => onSelectWeek(week.week)}
                            className={`w-full text-left px-3 py-2 rounded-md text-sm font-medium transition-colors ${activeWeek === week.week ? 'bg-sky-900/50 text-sky-300' : 'hover:bg-slate-800 text-slate-400'}`}
                         >
                             Semana {String(week.week).padStart(2, '0')}
                         </button>
                     ))}
                 </nav>
             </aside>
        );

        const App = () => {
            const [schedule, setSchedule] = useState(null);
            const [progress, setProgress] = useState({});
            const [searchTerm, setSearchTerm] = useState('');
            const [filter, setFilter] = useState('');
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeWeek, setActiveWeek] = useState(() => {
                const saved = localStorage.getItem('lastActiveWeek');
                return saved ? parseInt(saved, 10) : 1;
            });

            useEffect(() => {
                localStorage.setItem('lastActiveWeek', activeWeek);
            }, [activeWeek]);
            
            const firebaseConfig = {
                apiKey: "AIzaSyCvqp5HYUMnogWmwT0O1LFLOMsfqj9P83s",
                authDomain: "med-heklp.firebaseapp.com",
                projectId: "med-heklp",
                storageBucket: "med-heklp.appspot.com",
                messagingSenderId: "675054342845",
                appId: "1:675054342845:web:91e53e21060a087123ddd4",
                measurementId: "G-BLWYTWFFTZ"
            };

            const processInitialSchedule = useCallback(() => {
                const sourceLayout = window.scheduleData?.weeklyLayout || minimalInitialSchedule.weeklyLayout;
                const sourceApostilas = window.scheduleData?.apostilasData || minimalInitialSchedule.apostilasData;
                const sourceMapping = window.scheduleData?.disciplineMapping || minimalInitialSchedule.disciplineMapping;
                
                return sourceLayout.map(weekInfo => ({
                    ...weekInfo,
                    modules: weekInfo.modules.map(module => ({
                        ...module,
                        discipline: sourceMapping[module.code.split(' ')[0]] || 'Desconhecida',
                        lessons: module.lessons.map(lessonName => ({ name: lessonName, id: `W${weekInfo.week}-${module.code.replace(/\s/g, '')}-${lessonName.replace(/[^a-zA-Z0-9]/g, '')}` })),
                        bonusLessons: (sourceApostilas[module.code]?.bonusLessons || []).map(lessonName => ({ name: lessonName, id: `B-${module.code.replace(/\s/g, '')}-${lessonName.replace(/[^a-zA-Z0-9]/g, '')}` }))
                    }))
                }));
            }, []);

            useEffect(() => {
                try {
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    signInAnonymously(auth).catch(e => console.error("Anonymous sign-in error", e));
                    setDb(getFirestore(app));
                } catch (e) { console.error("Firebase init error:", e); setLoading(false); }
            }, []);

            useEffect(() => {
                if (!db) return;
                const progressDocRef = doc(db, 'progress', UNIVERSAL_USER_ID);
                const scheduleDocRef = doc(db, 'schedules', UNIVERSAL_USER_ID);

                const unsubProgress = onSnapshot(progressDocRef, (docSnap) => { if (docSnap.exists()) setProgress(docSnap.data()); });
                const unsubSchedule = onSnapshot(scheduleDocRef, (docSnap) => {
                    if (docSnap.exists() && docSnap.data().schedule && docSnap.data().version === SCHEDULE_VERSION) {
                        setSchedule(docSnap.data().schedule);
                    } else {
                        const processedSchedule = processInitialSchedule();
                        setDoc(scheduleDocRef, { schedule: processedSchedule, version: SCHEDULE_VERSION });
                        setSchedule(processedSchedule);
                    }
                    setLoading(false);
                }, () => { setSchedule(processInitialSchedule()); setLoading(false); });

                return () => { unsubProgress(); unsubSchedule(); };
            }, [db, processInitialSchedule]);
            
            const handleUpdateSchedule = useCallback(async (newSchedule) => {
                 if (!db) return;
                 try { await setDoc(doc(db, 'schedules', UNIVERSAL_USER_ID), { schedule: newSchedule, version: SCHEDULE_VERSION }); } 
                 catch (error) { console.error("Error saving schedule:", error); }
            }, [db]);

            const handleAddLesson = (weekIndex, moduleIndex, lessonName, isBonus) => {
                const newSchedule = JSON.parse(JSON.stringify(schedule));
                const week = newSchedule[weekIndex];
                if (week) {
                    const module = week.modules[moduleIndex];
                    const lessonList = isBonus ? module.bonusLessons : module.lessons;
                    const newLesson = { name: lessonName, id: `${isBonus ? 'B-' : `W${week.week}-`}${module.code.replace(/\s/g, '')}-${lessonName.replace(/[^a-zA-Z0-9]/g, '')}-${Date.now()}` };
                    lessonList.push(newLesson);
                    setSchedule(newSchedule);
                    handleUpdateSchedule(newSchedule);
                }
            };
            
            const handleRemoveLesson = (weekIndex, moduleIndex, lessonIndex, isBonus) => {
                if (!confirm('Tem certeza que deseja remover esta aula?')) return;
                const newSchedule = JSON.parse(JSON.stringify(schedule));
                const week = newSchedule[weekIndex];
                if (week) {
                    const module = week.modules[moduleIndex];
                    const lessonList = isBonus ? module.bonusLessons : module.lessons;
                    lessonList.splice(lessonIndex, 1);
                    setSchedule(newSchedule);
                    handleUpdateSchedule(newSchedule);
                }
            };

            const handleToggle = useCallback(async (lessonId, checkType) => {
                if (!db) { return; }
                const newProgress = { ...progress };
                if (!newProgress[lessonId]) newProgress[lessonId] = {};
                newProgress[lessonId][checkType] = !newProgress[lessonId][checkType];
                setProgress(newProgress);
                try { await setDoc(doc(db, 'progress', UNIVERSAL_USER_ID), newProgress, { merge: true }); } 
                catch (error) { console.error("Error saving progress: ", error); }
            }, [progress, db]);
            
            const isFiltered = searchTerm || filter;

            const filteredSchedule = useMemo(() => {
                if (!schedule) return [];
                return schedule.map(week => ({
                    ...week,
                    modules: week.modules
                        .filter(module => !filter || module.discipline === filter)
                        .map(module => {
                            if (!searchTerm) return module;

                            const searchLower = searchTerm.toLowerCase();
                            const moduleInfoMatches = module.discipline.toLowerCase().includes(searchLower) || module.title.toLowerCase().includes(searchLower);

                            const filteredLessons = module.lessons.filter(lesson => lesson.name.toLowerCase().includes(searchLower));
                            const filteredBonusLessons = (module.bonusLessons || []).filter(lesson => lesson.name.toLowerCase().includes(searchLower));

                            if (moduleInfoMatches || filteredLessons.length > 0 || filteredBonusLessons.length > 0) {
                                return { ...module, lessons: moduleInfoMatches ? module.lessons : filteredLessons, bonusLessons: moduleInfoMatches ? module.bonusLessons : filteredBonusLessons };
                            }
                            return null;
                        })
                        .filter(Boolean)
                })).filter(week => week.modules.length > 0);
            }, [schedule, searchTerm, filter]);
            
            const activeWeekData = useMemo(() => schedule ? schedule.find(w => w.week === activeWeek) : null, [schedule, activeWeek]);

            const renderContent = () => {
                 if (isFiltered) {
                    return (
                        <div className="space-y-4">
                            {filteredSchedule.length > 0 ? (
                                filteredSchedule.map(week => (
                                    <div key={week.week} className="p-4 rounded-xl bg-slate-900/50">
                                        <h3 className="text-xl font-bold mb-3 text-slate-100">Semana {String(week.week).padStart(2, '0')}</h3>
                                        <div className="space-y-4">
                                            {week.modules.map((module, moduleIndex) => (
                                                <ModuleCard key={`${module.code}-${week.week}`} module={module} weekIndex={schedule.findIndex(w => w.week === week.week)} moduleIndex={moduleIndex} progress={progress} onToggle={handleToggle} onAddLesson={handleAddLesson} onRemoveLesson={handleRemoveLesson} />
                                            ))}
                                        </div>
                                    </div>
                                ))
                            ) : (
                                <div className="text-center py-16 px-6 bg-slate-800 rounded-2xl shadow-md">
                                    <SvgIcon name="SearchX" className="mx-auto w-16 h-16 text-slate-500 mb-4" />
                                    <h3 className="text-xl font-semibold text-slate-100">Nenhum resultado encontrado</h3>
                                    <p className="text-slate-400 mt-2">Tente ajustar seus termos de busca ou filtros.</p>
                                </div>
                            )}
                        </div>
                    );
                }

                if (!activeWeekData) return null;
                
                return (
                    <div className="space-y-5">
                         <h3 className="text-2xl font-bold text-slate-100">Semana {String(activeWeekData.week).padStart(2, '0')}</h3>
                         {activeWeekData.modules.map((module, moduleIndex) => (
                            <ModuleCard key={module.code + module.title} module={module} weekIndex={activeWeek - 1} moduleIndex={moduleIndex} progress={progress} onToggle={handleToggle} onAddLesson={handleAddLesson} onRemoveLesson={handleRemoveLesson}/>
                         ))}
                    </div>
                );
            };

            if (loading || !schedule) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-slate-950">
                        <div className="flex items-center gap-4">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-sky-500"></div>
                            <span className="text-xl font-semibold text-slate-300">Carregando seus estudos...</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col bg-slate-900">
                    <Header onSearch={setSearchTerm} onFilter={setFilter} weeks={schedule} activeWeek={activeWeek} onSelectWeek={setActiveWeek} />
                    <div className="flex-1 flex overflow-hidden">
                        <Sidebar weeks={schedule} activeWeek={activeWeek} onSelectWeek={setActiveWeek} />
                        <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
                           {renderContent()}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
